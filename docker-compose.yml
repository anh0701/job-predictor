version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: job_predictor
      POSTGRES_USER: root
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"

  api:
    build: .
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - db

  worker:
    build: .
    command: python apps.worker.main.py
    depends_on:
      - db